name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: "staging"
      rollback_to:
        description: "Optional commit SHA to rollback to"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.rollback_to != '' && github.event.inputs.rollback_to || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Verify
        run: |
          python -m compileall .
          pytest -q

      - name: Deployment placeholder
        run: |
          echo "Deploying commit $GITHUB_SHA to ${{ github.event.inputs.environment }}"
          echo "Replace this step with your provider-specific deploy command."
